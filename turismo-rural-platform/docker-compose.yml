services:
  mysql:
    image: mysql:8.0
    container_name: turismo-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --require-secure-transport=OFF
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: turismo-phpmyadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${PMA_USER}
      PMA_PASSWORD: ${PMA_PASSWORD}
      UPLOAD_LIMIT: 50M
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true

  php-apache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: turismo-php
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./public:/var/www/html:rw
      - ./src:/var/www/html/src:rw
      - ./.env:/var/www/html/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true

volumes:
  mysql_data:
    driver: local

networks:
  app-network:
    driver: bridge
    name: turismo-network
