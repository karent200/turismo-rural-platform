services:
  db:
    image: postgres:15-alpine
    container_name: turismo_django_db
    restart: always
    environment:
      POSTGRES_DB: turismo_db
      POSTGRES_USER: turismo_user
      POSTGRES_PASSWORD: securepass123
    ports:
      - "5433:5432"
    volumes:
      - turismo_django_pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: turismo_django_api
    restart: always
    command: >
      sh -c "python manage.py makemigrations --noinput &&
      python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env.example
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: turismo_db
      DB_USER: turismo_user
      DB_PASS: securepass123
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOW_ALL_ORIGINS: "true"
    ports:
      - "8001:8000"
    depends_on:
      - db

volumes:
  turismo_django_pgdata:
