<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Turismo Rural</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
    <link href="vendor/fontawesome/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card mt-5">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4"><i class="fa-solid fa-mountain-sun text-success"></i> Iniciar Sesión</h3>
                        <form id="loginForm">
                            <div class="mb-3 position-relative">
                                <i class="fa-solid fa-envelope position-absolute" style="left:12px;top:50%;transform:translateY(-50%);color:#2E7D32;"></i>
                                <input type="email" class="form-control ps-5" name="email" placeholder="Email" required>
                            </div>
                            <div class="mb-3 position-relative">
                                <i class="fa-solid fa-lock position-absolute" style="left:12px;top:50%;transform:translateY(-50%);color:#2E7D32;"></i>
                                <input type="password" class="form-control ps-5" name="password" placeholder="Contraseña" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button>
                        </form>
                        <p class="text-center mt-3">
                            <a href="#" id="toRegister">Registrarse</a>
                        </p>
                        <div class="demo mt-3">
                            <small>Demo: turista@test.com / password</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
