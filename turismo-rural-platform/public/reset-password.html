<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Turismo Rural Nariño</title>
    <link href="vendor/fontawesome/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.7)),url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=2000&q=80');background-size:cover;">
        <div style="background:white;border-radius:20px;padding:2.5rem;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <i class="fa-solid fa-key" style="font-size:2.5rem;color:#2E7D32;"></i>
                <h2 style="color:#1B5E20;margin-top:0.5rem;">Nueva Contraseña</h2>
            </div>
            <div id="step-token" style="display:none;">
                <p style="color:#E53935;text-align:center;margin-bottom:1rem;">Token inválido o expirado.</p>
                <a href="index.html" style="display:block;text-align:center;color:#2E7D32;">← Volver al inicio</a>
            </div>
            <div id="step-form">
                <p style="color:#666;margin-bottom:1rem;font-size:0.9rem;text-align:center;">Debe tener 8+ caracteres, una mayúscula, un número y un carácter especial.</p>
                <div class="form-field has-icon">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" id="new-password" placeholder="Nueva contraseña" style="padding-left:2.75rem;padding-right:2.75rem;" required>
                    <i class="fa-regular fa-eye pw-toggle" onclick="togglePass('new-password',this)"></i>
                </div>
                <div class="form-field has-icon" style="margin-top:0.75rem;">
                    <i class="fa-solid fa-check field-icon"></i>
                    <input type="password" id="confirm-password" placeholder="Repetir contraseña" style="padding-left:2.75rem;padding-right:2.75rem;" required>
                    <i class="fa-regular fa-eye pw-toggle" onclick="togglePass('confirm-password',this)"></i>
                </div>
                <p id="reset-msg" style="color:#E53935;font-size:0.85rem;min-height:1.2rem;margin-top:0.5rem;"></p>
                <button onclick="resetPassword()" class="btn-auth-primary" style="margin-top:0.5rem;"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                <a href="index.html" style="display:block;text-align:center;margin-top:1rem;color:#2E7D32;font-size:0.85rem;">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
    const API = window.location.origin + "/src/";
    const token = new URLSearchParams(window.location.search).get('token') || '';

    if (!token || token.length < 10) {
        document.getElementById('step-token').style.display = 'block';
        document.getElementById('step-form').style.display = 'none';
    }

    function esc(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function togglePass(id, el) {
        var inp = document.getElementById(id);
        if (!inp) return;
        inp.type = inp.type === 'password' ? 'text' : 'password';
        el.className = inp.type === 'password' ? 'fa-regular fa-eye pw-toggle' : 'fa-regular fa-eye-slash pw-toggle';
    }

    function apiPost(url, data) {
        return fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: data,
        }).then(function(r) { return r.json(); });
    }

    function resetPassword() {
        var pass = document.getElementById('new-password').value;
        var confirm = document.getElementById('confirm-password').value;
        var msg = document.getElementById('reset-msg');

        if (pass.length < 8) { msg.textContent = 'Mínimo 8 caracteres'; return; }
        if (!/[A-Z]/.test(pass)) { msg.textContent = 'Falta una mayúscula'; return; }
        if (!/[0-9]/.test(pass)) { msg.textContent = 'Falta un número'; return; }
        if (!/[^a-zA-Z0-9]/.test(pass)) { msg.textContent = 'Falta un carácter especial'; return; }
        if (pass !== confirm) { msg.textContent = 'Las contraseñas no coinciden'; return; }

        msg.textContent = '';
        apiPost(API + "controllers/password.php", "action=reset&token=" + encodeURIComponent(token) + "&password=" + encodeURIComponent(pass))
        .then(function(d) {
            if (d.success) {
                msg.style.color = '#2E7D32';
                msg.textContent = 'Contraseña actualizada. Redirigiendo...';
                setTimeout(function() { window.location.href = 'index.html'; }, 2000);
            } else {
                msg.style.color = '#E53935';
                msg.textContent = d.error || 'Error al restablecer';
            }
        })
        .catch(function() {
            msg.textContent = 'Error de conexión';
        });
    }
    </script>
</body>
</html>
